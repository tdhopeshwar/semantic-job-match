services:
  - type: web
    name: semantic-job-match-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: |
      cd .. && bash render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: job-index
      mountPath: /data
      sizeGB: 1
